<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTrack AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>🌱 EcoTrack AI</h1>

    <p class="subtitle">
        Track your carbon footprint and receive personalized sustainability recommendations.
    </p>

    <form method="POST">

        <label for="travel">Daily Travel (km)</label>
        <input
            id="travel"
            name="travel"
            type="number"
            min="0"
            placeholder="Enter daily travel distance"
            required>

        <label for="electricity">Monthly Electricity Usage (kWh)</label>
        <input
            id="electricity"
            name="electricity"
            type="number"
            min="0"
            placeholder="Enter monthly electricity usage"
            required>

        <label for="diet">Diet Type</label>
        <select id="diet" name="diet">
            <option value="vegetarian">Vegetarian</option>
            <option value="non-vegetarian">Non-Vegetarian</option>
        </select>

        <button type="submit">Calculate Footprint</button>

    </form>

    {% if score is not none %}
    <div class="result">
        <h2>Carbon Score: {{ "%.2f"|format(score) }}</h2>
        <p>{{ recommendation }}</p>
    </div>
    {% endif %}

</div>

</body>
</html>
